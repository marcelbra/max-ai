repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.4
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: ruff-check-all
        name: ruff check (full codebase)
        entry: uv run ruff check src/ tests/
        language: system
        pass_filenames: false
        always_run: true

      - id: branch-name
        name: Check branch naming convention
        entry: scripts/check_branch_name.sh
        language: script
        stages: [pre-push]
        pass_filenames: false
        always_run: true

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.10.0
    hooks:
      - id: mypy
        additional_dependencies:
          - pydantic-settings
          - sqlalchemy[asyncio]
          - pytest
          - pytest-asyncio
          - jinja2
        args: [--ignore-missing-imports]
